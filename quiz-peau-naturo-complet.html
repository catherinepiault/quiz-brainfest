<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Peau & Naturopathie — Apprendre en jouant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f3ec;
  --card: #fffdf8;
  --sage: #6b9e78;
  --sage-light: #a8c9b0;
  --sage-dark: #3d6b4a;
  --terra: #c4784a;
  --terra-light: #e0a882;
  --gold: #c9a84c;
  --blush: #e8c4b0;
  --charcoal: #2a2520;
  --warm-grey: #7a7268;
  --cream: #faf6ef;
  --border: rgba(42,37,32,0.1);
  --success: #4a8c5c;
  --error: #b04040;
  --warning: #c9843a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Jost', sans-serif;
  background: var(--bg);
  color: var(--charcoal);
  min-height: 100vh;
  overflow-x: hidden;
}

/* BACKGROUND ORGANIC TEXTURE */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 10%, rgba(107,158,120,0.13) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 85% 85%, rgba(196,120,74,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(201,168,76,0.06) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 780px;
  margin: 0 auto;
  padding: 48px 20px 100px;
  position: relative;
  z-index: 1;
}

/* === ORGANIC SVG ILLUSTRATIONS === */
.illustration {
  display: flex;
  justify-content: center;
  margin: 12px 0 20px;
}
.illustration svg { filter: drop-shadow(0 4px 12px rgba(107,158,120,0.18)); }

/* === HEADER === */
.site-header {
  text-align: center;
  margin-bottom: 52px;
  animation: fadeDown 1s ease both;
}
.site-header .eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--sage-dark);
  margin-bottom: 18px;
  font-weight: 500;
}
.site-header .eyebrow::before,
.site-header .eyebrow::after {
  content: '';
  width: 30px; height: 1px;
  background: var(--sage);
}
.site-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.2rem, 6vw, 3.4rem);
  line-height: 1.12;
  font-weight: 600;
  color: var(--charcoal);
  margin-bottom: 16px;
}
.site-header h1 em { color: var(--terra); font-style: italic; }
.site-header .subtitle {
  font-size: 0.95rem;
  color: var(--warm-grey);
  letter-spacing: 0.5px;
}
.ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 20px 0;
}
.ornament-line { flex: 1; max-width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--sage-light)); }
.ornament-line.right { background: linear-gradient(90deg, var(--sage-light), transparent); }
.ornament-diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); }

/* === LEVEL TRACK === */
.level-track {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.lvl-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: 30px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  border: 1.5px solid var(--border);
  color: var(--warm-grey);
  background: rgba(255,253,248,0.7);
  transition: all 0.3s;
}
.lvl-pill.active { background: var(--terra); border-color: var(--terra); color: white; }
.lvl-pill.done { background: var(--sage); border-color: var(--sage); color: white; }

/* === CARDS === */
.card {
  background: var(--card);
  border-radius: 24px;
  padding: 44px 48px;
  box-shadow: 0 2px 40px rgba(42,37,32,0.08), 0 1px 3px rgba(42,37,32,0.05);
  border: 1px solid var(--border);
  animation: fadeUp 0.55s ease both;
  position: relative;
  overflow: hidden;
}
.card::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 120px; height: 120px;
  background: radial-gradient(circle at top right, rgba(107,158,120,0.08), transparent 70%);
  pointer-events: none;
}

/* === INTRO === */
.intro-card { text-align: center; }
.intro-card h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.9rem;
  font-weight: 600;
  margin-bottom: 18px;
  line-height: 1.3;
}
.intro-card p {
  font-size: 1.02rem;
  line-height: 1.8;
  color: #4a4540;
  margin-bottom: 14px;
  text-align: left;
}
.intro-highlight {
  background: linear-gradient(135deg, rgba(107,158,120,0.12), rgba(196,120,74,0.08));
  border-radius: 14px;
  padding: 18px 22px;
  margin: 20px 0;
  font-size: 0.93rem;
  line-height: 1.7;
  color: var(--sage-dark);
  border-left: 3px solid var(--sage);
  text-align: left;
  font-style: italic;
}

/* === LEVEL INTRO === */
.level-intro-card { text-align: center; }
.level-badge {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 90px; height: 90px;
  border-radius: 50%;
  margin-bottom: 20px;
  font-size: 2rem;
}
.level-intro-card h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  margin-bottom: 6px;
}
.level-tag {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 20px;
  font-weight: 500;
}
.level-intro-card .desc {
  font-size: 1rem;
  line-height: 1.75;
  color: #555;
  max-width: 520px;
  margin: 0 auto 28px;
}

/* === PROGRESS === */
.q-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.q-num { font-size: 12px; color: var(--warm-grey); letter-spacing: 1px; text-transform: uppercase; }
.q-tag {
  font-size: 11px; font-weight: 600;
  padding: 4px 12px; border-radius: 20px;
  letter-spacing: 1px; text-transform: uppercase;
}
.progress-wrap {
  height: 5px; background: rgba(42,37,32,0.08);
  border-radius: 3px; margin-bottom: 28px; overflow: hidden;
}
.progress-bar {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--sage), var(--terra));
  transition: width 0.6s cubic-bezier(.4,0,.2,1);
}
.q-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.45rem;
  font-weight: 600;
  line-height: 1.5;
  color: var(--charcoal);
  margin-bottom: 26px;
}
.q-retry-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(201,132,58,0.12);
  color: var(--warning);
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 20px;
  margin-bottom: 16px;
  font-weight: 600;
}

/* === OPTIONS === */
.options { display: flex; flex-direction: column; gap: 11px; }
.opt {
  display: flex; align-items: center; gap: 14px;
  padding: 15px 20px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  background: white;
  cursor: pointer;
  font-family: 'Jost', sans-serif;
  font-size: 0.97rem;
  color: var(--charcoal);
  text-align: left;
  transition: all 0.2s ease;
  width: 100%;
}
.opt:hover:not(:disabled) {
  border-color: var(--terra-light);
  background: rgba(228,168,130,0.06);
  transform: translateX(5px);
  box-shadow: 0 2px 12px rgba(196,120,74,0.1);
}
.opt-letter {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(42,37,32,0.06);
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 13px; flex-shrink: 0;
  transition: all 0.2s;
}
.opt.correct { border-color: var(--success); background: rgba(74,140,92,0.07); }
.opt.correct .opt-letter { background: var(--success); color: white; }
.opt.wrong { border-color: var(--error); background: rgba(176,64,64,0.06); }
.opt.wrong .opt-letter { background: var(--error); color: white; }
.opt:disabled { cursor: default; }

/* === FEEDBACK === */
.feedback {
  margin-top: 18px;
  padding: 18px 22px;
  border-radius: 14px;
  font-size: 0.93rem;
  line-height: 1.65;
  animation: fadeUp 0.35s ease both;
}
.feedback.ok { background: rgba(74,140,92,0.09); border-left: 4px solid var(--success); color: #234d30; }
.feedback.ko { background: rgba(176,64,64,0.07); border-left: 4px solid var(--error); color: #6b2020; }
.feedback strong { display: block; margin-bottom: 6px; font-size: 1rem; }

/* === ENCOURAGE === */
.encourage {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(201,168,76,0.10);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 12px;
  padding: 12px 16px;
  margin-top: 14px;
  font-size: 0.88rem;
  color: #5a4a10;
  font-style: italic;
  animation: fadeUp 0.4s ease both;
}
.encourage .enc-icon { font-size: 1.3rem; flex-shrink: 0; }

/* === SUPPLEMENT BUBBLE === */
.supp-bubble {
  background: linear-gradient(135deg, rgba(107,158,120,0.13), rgba(201,168,76,0.10));
  border: 1.5px solid rgba(107,158,120,0.3);
  border-radius: 20px;
  padding: 22px 26px;
  margin-top: 24px;
  animation: fadeUp 0.5s ease 0.2s both;
  position: relative;
}
.supp-bubble::before {
  content: '🌿';
  position: absolute;
  top: -14px; left: 24px;
  font-size: 1.4rem;
  background: var(--card);
  padding: 0 6px;
}
.supp-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--sage-dark);
  margin-bottom: 10px;
}
.supp-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.supp-list li {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 0.88rem; line-height: 1.55; color: #3a4a3e;
}
.supp-list li::before { content: '◆'; color: var(--sage); font-size: 0.6rem; margin-top: 5px; flex-shrink: 0; }
.supp-placeholder {
  display: inline-block;
  background: rgba(107,158,120,0.2);
  border: 1px dashed var(--sage);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 0.8rem;
  color: var(--sage-dark);
  font-style: italic;
  cursor: pointer;
}

/* === LEVEL DEBRIEF === */
.debrief {
  background: linear-gradient(135deg, rgba(42,37,32,0.03), rgba(107,158,120,0.06));
  border-radius: 16px;
  padding: 24px;
  margin: 20px 0;
  border: 1px solid var(--border);
}
.debrief-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.debrief p { font-size: 0.93rem; line-height: 1.7; color: #4a4540; margin-bottom: 8px; }
.debrief p:last-child { margin-bottom: 0; }

/* === SCORE DISPLAY === */
.score-ring {
  width: 110px; height: 110px;
  border-radius: 50%;
  background: conic-gradient(var(--sage) 0%, var(--terra) 100%);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  box-shadow: 0 6px 24px rgba(107,158,120,0.25);
}
.score-inner {
  width: 82px; height: 82px;
  border-radius: 50%;
  background: white;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.score-num { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; color: var(--charcoal); line-height: 1; }
.score-of { font-size: 0.7rem; color: var(--warm-grey); }

/* === BUTTONS === */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 28px; border-radius: 50px;
  border: none; cursor: pointer;
  font-family: 'Jost', sans-serif;
  font-size: 0.93rem; font-weight: 500;
  transition: all 0.25s ease;
  letter-spacing: 0.3px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--terra), #a85c2c);
  color: white;
  box-shadow: 0 4px 18px rgba(196,120,74,0.28);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 7px 22px rgba(196,120,74,0.38); }
.btn-sage {
  background: linear-gradient(135deg, var(--sage), var(--sage-dark));
  color: white;
  box-shadow: 0 4px 18px rgba(107,158,120,0.25);
}
.btn-sage:hover { transform: translateY(-2px); box-shadow: 0 7px 22px rgba(107,158,120,0.35); }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--sage);
  color: var(--sage-dark);
}
.btn-outline:hover { background: rgba(107,158,120,0.08); }
.btn-row {
  display: flex; gap: 12px; margin-top: 24px;
  flex-wrap: wrap; justify-content: flex-end;
}
.btn-row.center { justify-content: center; }

/* === FINAL === */
.final-card { text-align: center; }
.trophy-wrap { font-size: 72px; margin-bottom: 16px; display: block; animation: bounceIn 0.8s ease; }
.final-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; margin-bottom: 10px; }
.final-score { font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: var(--terra); font-weight: 600; }
.final-msg { font-size: 1rem; line-height: 1.75; color: #4a4540; margin: 18px 0 24px; }
.cta-box {
  background: linear-gradient(135deg, rgba(107,158,120,0.12), rgba(196,120,74,0.10));
  border: 2px solid rgba(107,158,120,0.3);
  border-radius: 20px;
  padding: 32px 28px;
}
.cta-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; margin-bottom: 10px; color: var(--sage-dark); }
.cta-box p { font-size: 0.95rem; color: #555; margin-bottom: 22px; line-height: 1.65; }

/* === ANIMATIONS === */
@keyframes fadeUp { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeDown { from { opacity:0; transform:translateY(-22px); } to { opacity:1; transform:translateY(0); } }
@keyframes bounceIn {
  0% { transform: scale(0.5) rotate(-10deg); opacity:0; }
  60% { transform: scale(1.15) rotate(3deg); }
  100% { transform: scale(1) rotate(0deg); opacity:1; }
}
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.06); } }
@keyframes floatLeaf { 0%,100% { transform:translateY(0) rotate(0deg); } 50% { transform:translateY(-8px) rotate(5deg); } }
.float { animation: floatLeaf 4s ease-in-out infinite; }

/* === RESPONSIVE === */
@media(max-width:580px) {
  .card { padding: 28px 20px; }
  .q-text { font-size: 1.2rem; }
  .btn-row { justify-content: center; }
  .site-header h1 { font-size: 2rem; }
}
</style>
</head>

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const screens = {
    intro: renderIntro,
    'lvl-intro': renderLvlIntro,
    question: renderQuestion,
    'lvl-done': renderLvlDone,
    'retry-intro': renderRetryIntro,
    'retry-done': renderRetryDone,
    final: renderFinal,
  };
  if (screens[S.screen]) screens[S.screen](app);
}

function ltrack() {
  return `<div class="level-track">${LEVELS.map((l,i)=>`
    <div class="lvl-pill ${i<S.lvl?'done':i===S.lvl?'active':''}">
      ${l.emoji} Niv. ${l.id}
    </div>`).join('')}</div>`;
}

// QUESTION
function renderQuestion(app) {
  const l = LEVELS[S.lvl];
  const qs = S.retry ? l.retryQuestions : l.questions;
  const q = qs[S.qIdx];
  const total = qs.length;
  const pct = (S.qIdx / total) * 100;
  const letters = ['A','B','C','D'];

  const opts = q.options.map((o,i)=>{
    let cls='';
    if(S.answered){
      if(i===q.correct) cls='correct';
      else if(i===S.selected) cls='wrong';
    }
    return `<button class="opt ${cls}" onclick="pick(${i})" ${S.answered?'disabled':''}>
      <span class="opt-letter">${letters[i]}</span>
      <span>${o}</span>
    </button>`;
  }).join('');

  let feedback='', encourage='';
  if(S.answered){
    const ok = S.selected===q.correct;
    feedback=`<div class="feedback ${ok?'ok':'ko'}"><strong>${ok?q.ok:q.ko}</strong></div>`;
    if(!ok) encourage=`<div class="encourage"><span class="enc-icon">💪</span>${q.encourage}</div>`;
  }

  let nextBtn='';
  if(S.answered) nextBtn=`<div class="btn-row"><button class="btn btn-sage" onclick="nextQ()">Continuer →</button></div>`;

  const retryBadge = S.retry ? `<div class="q-retry-badge">⚡ Question de rattrapage</div>` : '';

  app.innerHTML=`
  ${ltrack()}
  <div class="card">
    ${retryBadge}
    <div class="q-meta">
      <div class="q-num">Question ${S.qIdx+1} / ${total}</div>
      <div class="q-tag" style="background:${l.bgTag};color:${l.colorTag};">${l.emoji} ${l.name}</div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    <div class="q-text">${q.text}</div>
    <div class="options">${opts}</div>
    ${feedback}
    ${encourage}
    ${nextBtn}
  </div>`;
}

// LEVEL DONE
function renderLvlDone(app) {
  const l = LEVELS[S.lvl];
  const score = S.scores[S.lvl];
  const total = l.questions.length;
  const perfect = score === total;

  const debriefItems = l.debrief.map(d=>`<p>◆ ${d}</p>`).join('');
  const suppItems = l.supplements.items.map(s=>`
    <li>
      <div><strong>${s.label}</strong> — ${s.desc}<br>
      <span class="supp-placeholder" title="Cliquez pour ajouter votre recommandation produit">${s.placeholder}</span></div>
    </li>`).join('');

  let msg='', nextBtn='';
  if(perfect){
    msg=`<div class="encourage" style="background:rgba(74,140,92,0.12);border-color:rgba(74,140,92,0.3);color:#234d30;margin-bottom:0;">
      <span class="enc-icon">🎉</span>Score parfait ! Vous maîtrisez ce niveau. Votre peau vous dit merci.
    </div>`;
    if(S.lvl < LEVELS.length-1){
      nextBtn=`<button class="btn btn-primary" onclick="nextLevel()">Niveau ${S.lvl+2} ${LEVELS[S.lvl+1].emoji} →</button>`;
    } else {
      nextBtn=`<button class="btn btn-primary" onclick="go('final')">Voir mon bilan final 🏆</button>`;
    }
  } else {
    msg=`<div class="encourage" style="background:rgba(201,132,58,0.1);border-color:rgba(201,132,58,0.3);color:#7a4a00;margin-bottom:0;">
      <span class="enc-icon">📚</span>Quelques réponses à consolider ! Des questions reformulées vont vous aider à bien ancrer les notions. C'est le cœur de l'apprentissage.
    </div>`;
    nextBtn=`<button class="btn btn-outline" onclick="startRetry()">Questions de rattrapage →</button>`;
  }

  app.innerHTML=`
  ${ltrack()}
  <div class="card">
    <div style="text-align:center; padding: 12px 0 20px;">
      <div class="score-ring">
        <div class="score-inner">
          <div class="score-num">${score}/${total}</div>
          <div class="score-of">réponses justes</div>
        </div>
      </div>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.7rem;margin-bottom:16px;">
        ${perfect ? '🌟 Bravo !' : '💡 Presque !'}
      </h2>
      ${msg}
    </div>

    <div class="debrief" style="margin-top:28px;">
      <div class="debrief-title">📖 Ce qu'il faut retenir</div>
      ${debriefItems}
    </div>

    <div class="supp-bubble">
      <div class="supp-title">${l.supplements.title}</div>
      <ul class="supp-list">${suppItems}</ul>
    </div>

    <div class="btn-row center" style="margin-top:28px;">${nextBtn}</div>
  </div>`;
}

// RETRY INTRO
function renderRetryIntro(app) {
  const l = LEVELS[S.lvl];
  app.innerHTML=`
  ${ltrack()}
  <div class="card" style="text-align:center;">
    <div class="illustration float">${SVG.level2}</div>
    <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.8rem;margin-bottom:12px;">Questions de rattrapage</h2>
    <p style="font-size:1rem;color:#555;line-height:1.75;max-width:500px;margin:0 auto 20px;">
      Ces questions abordent les <strong>mêmes notions</strong> que le niveau ${l.id}, 
      mais formulées différemment — avec des pièges subtils. 
      Prenez le temps de réfléchir avant de répondre.
    </p>
    <div class="intro-highlight" style="text-align:left;max-width:500px;margin:0 auto 24px;">
      🎯 Objectif : comprendre, pas juste répondre. Chaque erreur vous rapproche de la maîtrise.
    </div>
    <div class="btn-row center">
      <button class="btn btn-primary" onclick="launchRetry()">Je suis prêt·e !</button>
    </div>
  </div>`;
}

// RETRY DONE
function renderRetryDone(app) {
  const l = LEVELS[S.lvl];
  const isLast = S.lvl === LEVELS.length-1;
  app.innerHTML=`
  ${ltrack()}
  <div class="card" style="text-align:center;">
    <div style="font-size:52px;margin-bottom:16px;">🎉</div>
    <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.8rem;margin-bottom:12px;">Rattrapage accompli !</h2>
    <p style="font-size:1rem;color:#555;line-height:1.75;margin-bottom:20px;">
      Félicitations ! Vous avez consolidé les notions clés du <strong>Niveau ${l.id} — ${l.name}</strong>. 
      Ces connaissances sont maintenant bien ancrées. Vous pouvez avancer avec confiance.
    </p>
    <div class="encourage" style="justify-content:center;background:rgba(74,140,92,0.1);border-color:rgba(74,140,92,0.3);color:#234d30;">
      <span class="enc-icon">🌱</span>
      L'apprentissage par l'erreur est le plus durable. Vous venez d'en faire la preuve !
    </div>
    <div class="btn-row center" style="margin-top:28px;">
      ${isLast
        ? `<button class="btn btn-primary" onclick="go('final')">Mon bilan final 🏆</button>`
        : `<button class="btn btn-primary" onclick="nextLevel()">Niveau ${S.lvl+2} ${LEVELS[S.lvl+1].emoji} →</button>`}
    </div>
  </div>`;
}

// FINAL
function renderFinal(app) {
  const total = LEVELS.reduce((s,l)=>s+l.questions.length, 0);
  const scored = S.scores.reduce((a,b)=>a+b, 0);
  const pct = Math.round((scored/total)*100);
  const medal = pct>=90?'🏆':pct>=70?'🌟':'🌱';
  const title = pct>=90?'Vous êtes une véritable experte de la peau !'
    :pct>=70?'Bravo, vous avez fait un beau chemin !'
    :'Vous avez planté des graines précieuses !';

  app.innerHTML=`
  <div class="card final-card">
    <div class="illustration float">${SVG.final}</div>
    <span class="trophy-wrap" style="display:block;font-size:64px;margin-bottom:10px;">${medal}</span>
    <h2>${title}</h2>
    <div class="final-score">${scored} / ${total}</div>
    <p style="font-size:0.85rem;color:var(--warm-grey);margin-bottom:20px;">Score global : ${pct}%</p>
    <p class="final-msg">
      Vous avez parcouru les 4 niveaux de ce quiz sur l'acné, l'eczéma et le psoriasis. 
      Vous savez maintenant que la peau n'est pas qu'une enveloppe — c'est un organe de communication 
      entre votre monde intérieur et extérieur. Elle reflète votre alimentation, votre microbiome, 
      votre stress, vos hormones et votre histoire.
      <br><br>
      La naturopathie offre des outils puissants. Mais le terrain de chaque personne est unique, 
      et les meilleures solutions sont celles qui sont personnalisées.
    </p>

    <div class="cta-box">
      <h3>🌿 Passez à l'étape suivante</h3>
      <p>
        Ce quiz vous a donné les clés — mais votre peau mérite une approche sur mesure. 
        Un·e naturopathe qualifié·e peut établir un bilan de terrain complet 
        et vous proposer un protocole personnalisé pour <strong>acné, eczéma ou psoriasis</strong>.
        <br><br>
        <em>"Vous n'êtes pas un symptôme. Vous êtes une personne entière."</em>
      </p>
      <button class="btn btn-sage" onclick="alert('Merci de votre intérêt ! Contactez votre naturopathe pour prendre rendez-vous. 📅')">
        📅 Prendre rendez-vous avec un·e naturopathe
      </button>
    </div>

    <div class="btn-row center" style="margin-top:28px;">
      <button class="btn btn-outline" onclick="resetQuiz()">🔄 Recommencer depuis le début</button>
    </div>
  </div>`;
}

// ==============================
// ACTIONS
// ==============================
function go(screen) { S.screen=screen; render(); }

function startLevel() {
  S.qIdx=0; S.answered=false; S.selected=null; S.retry=false;
  S.scores[S.lvl]=0;
  S.screen='question'; render();
}

function pick(i) {
  if(S.answered) return;
  S.answered=true; S.selected=i;
  const l=LEVELS[S.lvl];
  const qs=S.retry?l.retryQuestions:l.questions;
  if(i===qs[S.qIdx].correct){
    if(S.retry) S.rScore++;
    else S.scores[S.lvl]++;
  }
  render();
}

function nextQ() {
  const l=LEVELS[S.lvl];
  const qs=S.retry?l.retryQuestions:l.questions;
  S.answered=false; S.selected=null;
  if(S.qIdx < qs.length-1){
    S.qIdx++;
    S.screen='question';
  } else {
    if(!S.retry){
      S.screen='lvl-done';
    } else {
      S.screen='retry-done';
    }
  }
  render();
}

function startRetry() {
  S.screen='retry-intro'; render();
}

function launchRetry() {
  S.retry=true; S.qIdx=0; S.rScore=0; S.answered=false; S.selected=null;
  S.screen='question'; render();
}

function nextLevel() {
  S.lvl++;
  S.screen='lvl-intro'; render();
}

function resetQuiz() {
  S={ screen:'intro', lvl:0, qIdx:0, answered:false, selected:null, scores:[0,0,0,0], retry:false, rIdx:0, rScore:0 };
  render();
}

// INIT
render();
</script>
</body>
</html>
