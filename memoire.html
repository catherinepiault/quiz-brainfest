<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainFest — Entraînez votre mémoire</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--sage:#3d6b4a;--sage-mid:#6b9e78;--sage-light:#e8f5ec;--cream:#f7f3ec;--charcoal:#2a2520;--grey:#7a7268;--grey-light:#f0ede8;--white:#fff;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);}
.layout{display:flex;flex-direction:column;height:100vh;width:100%;max-width:680px;margin:0 auto;}
.cards-zone{flex-shrink:0;padding:8px 16px 6px;background:var(--white);border-bottom:1px solid var(--grey-light);}
.cards-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-bottom:6px;}
.cards-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.cards-scroll::-webkit-scrollbar{display:none;}
.quiz-card{flex-shrink:0;width:160px;background:var(--cream);border-radius:12px;padding:10px 12px;cursor:pointer;border:2px solid transparent;transition:all 0.2s ease;display:flex;align-items:center;gap:10px;}
.quiz-card:hover:not(.soon){border-color:var(--sage-mid);background:var(--sage-light);}
.quiz-card.active{border-color:var(--sage);box-shadow:0 4px 16px rgba(61,107,74,0.25);}
.quiz-card.soon{opacity:0.45;cursor:default;}
.card-emoji{font-size:20px;flex-shrink:0;}
.card-body{display:flex;flex-direction:column;gap:3px;min-width:0;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;color:var(--charcoal);line-height:1.25;}
.quiz-card.active .card-title{color:var(--sage);}
.card-badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:8px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;}
.badge-ok{background:var(--sage-light);color:var(--sage);}
.badge-soon{background:var(--grey-light);color:var(--grey);}
.quiz-zone{flex:1;position:relative;overflow:hidden;background:var(--grey-light);min-height:0;}
.empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;transition:opacity 0.3s;}
.empty-state.hidden{opacity:0;pointer-events:none;}
.empty-icon{font-size:38px;margin-bottom:10px;animation:float 3s ease-in-out infinite;}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;color:var(--charcoal);margin-bottom:4px;}
.empty-sub{font-size:12px;color:var(--grey);line-height:1.6;}
.qframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;background:#fff;}
.qframe.visible{display:block;}
.share-strip{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:7px;padding:5px 16px;background:#fff;border-top:1px solid var(--grey-light);}
.share-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--grey);}
.sbtn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;text-decoration:none;background:var(--sage);color:#fff;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
</style>
</head>
<body>
<div class="layout">
  <div class="cards-zone">
    <div class="cards-label">Choisissez un jeu →</div>
    <div class="cards-scroll">

      <div class="quiz-card" id="card-couleurs">
        <span class="card-emoji">🎨</span>
        <div class="card-body">
          <div class="card-title">Mémoire des Couleurs</div>
          <span class="card-badge badge-ok">Disponible</span>
        </div>
      </div>

      <div class="quiz-card soon">
        <span class="card-emoji">🎵</span>
        <div class="card-body">
          <div class="card-title">Suites de Notes</div>
          <span class="card-badge badge-soon">Bientôt</span>
        </div>
      </div>

      <div class="quiz-card soon">
        <span class="card-emoji">🌿</span>
        <div class="card-body">
          <div class="card-title">Paires de Plantes</div>
          <span class="card-badge badge-soon">Bientôt</span>
        </div>
      </div>

      <div class="quiz-card soon">
        <span class="card-emoji">🧩</span>
        <div class="card-body">
          <div class="card-title">Puzzle Aliments</div>
          <span class="card-badge badge-soon">Bientôt</span>
        </div>
      </div>

    </div>
  </div>

  <div class="quiz-zone">
    <div class="empty-state" id="es">
      <div class="empty-icon">🧠</div>
      <div class="empty-title">Choisissez un jeu ci-dessus</div>
      <div class="empty-sub">Cliquez sur une carte pour commencer.<br>Le jeu s'affichera ici immédiatement.</div>
    </div>
    <iframe class="qframe" id="qf" src="" allowfullscreen></iframe>
  </div>

  <div class="share-strip">
    <span class="share-label">Partager</span>
    <a class="sbtn" href="sms:?body=Entraînez votre mémoire sur BrainFest !">📱 SMS</a>
    <a class="sbtn" href="https://wa.me/?text=Entraînez votre mémoire sur BrainFest !" target="_blank">💬 WhatsApp</a>
    <a class="sbtn" href="mailto:?subject=BrainFest&body=Entraînez votre mémoire !">✉️ Email</a>
  </div>
</div>

<script>
var GAMES = {
  'card-couleurs': 'https://catherinepiault.github.io/quiz-brainfest/jeu-couleurs.html'
};
var activeCard = null;
var es = document.getElementById('es');
var qf = document.getElementById('qf');

Object.keys(GAMES).forEach(function(cardId) {
  var card = document.getElementById(cardId);
  if (!card) return;
  card.addEventListener('click', function() {
    if (activeCard) document.getElementById(activeCard).classList.remove('active');
    activeCard = cardId;
    card.classList.add('active');
    qf.src = GAMES[cardId];
    es.classList.add('hidden');
    qf.classList.add('visible');
  });
});
</script>
</body>
</html>
